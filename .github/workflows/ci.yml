name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build bndtools.runtime.applaunch.eclipse3
        run: ant -f bndtools.runtime.applaunch.eclipse3/build.xml build

      - name: Build bndtools.runtime.applaunch.eclipse4
        run: ant -f bndtools.runtime.applaunch.eclipse4/build.xml build

      - name: Build bndtools.runtime.applaunch.eclipse3.test
        run: ant -f bndtools.runtime.applaunch.eclipse3.test/build.xml build

      - name: Build bndtools.runtime.applaunch.eclipse4.test
        run: ant -f bndtools.runtime.applaunch.eclipse4.test/build.xml build
